<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gradify - Teacher Dashboard</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 18 CDN without JSX -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Import Map for Firebase Modules -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
        "firebase/storage": "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { protectRoute } from './js/auth.js';
    protectRoute('teacher');

    import { injectCSS } from './js/common-components.js';
    import { TeacherDash } from './js/dashboards.js';
    import { db, auth } from './js/firebase-config.js';
    import { collection, onSnapshot } from 'firebase/firestore';
    import { onAuthStateChanged } from 'firebase/auth';

    const { createElement: e, useState, useEffect } = React;

    function App() {
      const [appState, setAppState] = useState({ users: [], exams: [], subjects: [], subjectExams: [] });
      const [user, setUser] = useState(null);

      useEffect(() => {
        injectCSS();
        
        onAuthStateChanged(auth, u => {
            if (u) {
                // In a real app we fetch name from users collection
                setUser({ uid: u.uid, name: u.email.split('@')[0], role: 'teacher' });
            }
        });

        const unsubUsers = onSnapshot(collection(db, 'users'), sn => {
          setAppState(p => ({ ...p, users: sn.docs.map(d => ({ id: d.id, ...d.data() })) }));
        });
        const unsubExams = onSnapshot(collection(db, 'submissions'), sn => {
            setAppState(p => ({ ...p, exams: sn.docs.map(d => ({ id: d.id, ...d.data() })) }));
        });
        const unsubSubj = onSnapshot(collection(db, 'subjects'), sn => {
            setAppState(p => ({ ...p, subjects: sn.docs.map(d => ({ id: d.id, ...d.data() })) }));
        });
        const unsubSe = onSnapshot(collection(db, 'subjectExams'), sn => {
            setAppState(p => ({ ...p, subjectExams: sn.docs.map(d => ({ id: d.id, ...d.data() })) }));
        });

        return () => { unsubUsers(); unsubExams(); unsubSubj(); unsubSe(); };
      }, []);

      if (!user) return e("div", { style: {color: "white", padding: 20} }, "Loading Teacher...");

      return e(TeacherDash, { currentUser: user, appState });
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>
</html>
